version: 1
services:
  - service_name: indexer
    image_repo: raksha-indexer
    container_port: 8081
    health_path: /health
    exposure: internal
    deploy_strategy: rolling
    scaling_class: fixed
    cpu: 512
    memory: 1024
    command: ["/app/bin/indexer"]
    desired_count:
      test: 0  # off by default — enable via streams_enabled = true in tfvars
      stage: 1
      prod: 2

  - service_name: detector
    image_repo: raksha-detector
    container_port: 8082
    health_path: /health
    exposure: internal
    deploy_strategy: rolling
    scaling_class: worker_cpu_and_lag
    cpu: 1024
    memory: 2048
    command: ["/app/bin/detector"]
    desired_count:
      test: 0  # off by default — enable via streams_enabled = true in tfvars
      stage: 3
      prod: 5

  - service_name: orchestrator
    image_repo: raksha-orchestrator
    container_port: 8084
    health_path: /health
    exposure: internal
    deploy_strategy: rolling
    scaling_class: worker_cpu_and_lag
    cpu: 512
    memory: 1024
    command: ["/app/bin/orchestrator"]
    desired_count:
      test: 0  # off by default — enable via streams_enabled = true in tfvars
      stage: 2
      prod: 3

  - service_name: finality
    image_repo: raksha-finality
    container_port: 8085
    health_path: /health
    exposure: internal
    deploy_strategy: rolling
    scaling_class: fixed
    cpu: 256
    memory: 512
    command: ["/app/bin/finality"]
    desired_count:
      test: 0  # off by default — enable via streams_enabled = true in tfvars
      stage: 1
      prod: 2

  - service_name: history-worker
    image_repo: raksha-history-worker
    container_port: 8080
    health_path: /health
    exposure: internal
    deploy_strategy: rolling
    scaling_class: fixed
    cpu: 256
    memory: 512
    command: ["/app/bin/history-worker"]
    desired_count:
      test: 0  # off by default — enable via streams_enabled = true in tfvars
      stage: 1
      prod: 1
