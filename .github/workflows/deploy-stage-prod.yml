name: Deploy Stage/Prod

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: Deployment environment
        required: true
        default: stage
        type: choice
        options:
          - stage
          - prod
      image_tag:
        description: Image tag to deploy
        required: true
        default: latest
        type: string
      apply_infra:
        description: Apply Terraform before service rollout
        required: true
        default: false
        type: boolean
      service_filter:
        description: Comma-separated service names (empty = all)
        required: false
        default: ''
        type: string

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-1

jobs:
  deploy:
    name: Deploy ${{ inputs.target_environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.target_environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.target_environment == 'prod' && secrets.AWS_PROD_DEPLOY_ROLE_ARN || secrets.AWS_STAGE_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        working-directory: infra/terraform/environments/${{ inputs.target_environment }}
        run: terraform init -backend=false

      - name: Terraform apply
        if: inputs.apply_infra == true
        working-directory: infra/terraform/environments/${{ inputs.target_environment }}
        run: |
          terraform apply -auto-approve -var="image_tag=${{ inputs.image_tag }}"

      - name: Resolve cluster name
        id: cluster
        working-directory: infra/terraform/environments/${{ inputs.target_environment }}
        env:
          FALLBACK_STAGE: ${{ secrets.STAGE_ECS_CLUSTER }}
          FALLBACK_PROD: ${{ secrets.PROD_ECS_CLUSTER }}
        run: |
          set -e
          CLUSTER=""
          if terraform output -raw cluster_name >/tmp/cluster_name 2>/tmp/cluster_err; then
            CLUSTER=$(cat /tmp/cluster_name)
          else
            if [ "${{ inputs.target_environment }}" = "prod" ] && [ -n "$FALLBACK_PROD" ]; then
              CLUSTER="$FALLBACK_PROD"
            elif [ "${{ inputs.target_environment }}" = "stage" ] && [ -n "$FALLBACK_STAGE" ]; then
              CLUSTER="$FALLBACK_STAGE"
            fi
          fi

          if [ -z "$CLUSTER" ]; then
            echo "Unable to determine ECS cluster name"
            cat /tmp/cluster_err || true
            exit 1
          fi

          echo "cluster_name=$CLUSTER" >> "$GITHUB_OUTPUT"

      - name: Deploy ECS services
        env:
          CLUSTER_NAME: ${{ steps.cluster.outputs.cluster_name }}
          TARGET_ENV: ${{ inputs.target_environment }}
          SERVICE_FILTER: ${{ inputs.service_filter }}
        run: |
          set -euo pipefail

          SERVICES=(
            indexer detector scorer orchestrator finality market-indexer market-detector
          )

          FILTER=",${SERVICE_FILTER},"

          for svc in "${SERVICES[@]}"; do
            if [ -n "${SERVICE_FILTER}" ] && ! echo "$FILTER" | grep -q ",$svc,"; then
              continue
            fi

            echo "Deploying ${svc}"
            aws ecs update-service \
              --cluster "$CLUSTER_NAME" \
              --service "defi-surv-${TARGET_ENV}-${svc}" \
              --force-new-deployment \
              --region "$AWS_REGION"
          done
