name: Build and Push Core Images

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      service_filter:
        description: Comma-separated service names to build (empty = all)
        required: false
        default: ''
        type: string

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-1

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      core_changed: ${{ steps.filter.outputs.core }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            core:
              - 'apps/**'
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'Dockerfile'
              - 'infra/service-catalog.yaml'

  build-core:
    name: Build Core Images
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.core_changed == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [indexer, detector, scorer, orchestrator, finality, market-indexer, market-detector]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_IMAGES_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Service filter check
        id: filter-check
        run: |
          FILTER="${{ github.event.inputs.service_filter }}"
          if [ -z "$FILTER" ]; then
            echo "build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          FILTER=",${FILTER},"
          if echo "$FILTER" | grep -q ",${{ matrix.service }},"; then
            echo "build=true" >> "$GITHUB_OUTPUT"
          else
            echo "build=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract metadata
        if: steps.filter-check.outputs.build == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/defi-surv-${{ matrix.service }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        if: steps.filter-check.outputs.build == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        if: steps.filter-check.outputs.build == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
