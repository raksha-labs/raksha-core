name: Build and Push Core Images

# Image builds for master pushes are handled by deploy-test.yml (build-images → deploy).
# This workflow is for tag-based releases and manual builds only.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      service_filter:
        description: Comma-separated service names to build (empty = all)
        required: false
        default: ''
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  build:
    uses: ./.github/workflows/reusable-image-build.yml
    with:
      aws_region: eu-west-1
      service_filter: ${{ github.event.inputs.service_filter || '' }}
      image_tag: ${{ format('sha-{0}', github.sha) }}
      push_latest: ${{ github.ref == 'refs/heads/master' }}
    secrets:
      aws_role_arn: ${{ secrets.AWS_IMAGES_ROLE_ARN }}
