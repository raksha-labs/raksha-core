name: Deploy Test Environment

on:
  push:
    branches: [master]
    paths:
      - 'infra/**'
      - 'apps/**'
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'Dockerfile'
      - '.github/workflows/deploy-test.yml'
      - '.github/workflows/reusable-ecs-rollout.yml'
      - '.github/workflows/reusable-image-build.yml'
      - 'scripts/ci/**'
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (leave empty to build fresh images)'
        required: false
        default: ''
        type: string
      force_build:
        description: Force image build even when only CI/infrastructure files changed
        required: true
        default: false
        type: boolean
      apply_infra:
        description: Apply Terraform before deploy
        required: true
        default: true
        type: boolean
      service_filter:
        description: Comma-separated service names (empty = all)
        required: false
        default: ''
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      build_required: ${{ steps.filter.outputs.build_required }}
      ci_scripts_changed: ${{ steps.filter.outputs.ci_scripts_changed }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect code/image-impacting changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            build_required:
              - 'apps/**'
              - 'crates/**'
              - 'schemas/**'
              - 'rules/**'
              - 'scenarios/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'Dockerfile'
              - 'infra/service-catalog.yaml'
            ci_scripts_changed:
              - 'scripts/ci/**'

  guard-rails:
    needs: detect-changes
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' && needs.detect-changes.outputs.ci_scripts_changed == 'true' && needs.detect-changes.outputs.build_required != 'true' }}
    steps:
      - name: Warn when build is skipped for CI script-only change
        run: |
          echo "::warning title=Image build skipped::Only scripts/ci changed, so image build was skipped. If CI scripts now affect image contents, include those paths in detect-changes.build_required or run workflow_dispatch with force_build=true."

  build-images:
    needs: detect-changes
    # Build images on push, or on dispatch when no pre-built image_tag is provided
    if: ${{ (github.event_name == 'push' && needs.detect-changes.outputs.build_required == 'true') || (github.event_name == 'workflow_dispatch' && (github.event.inputs.image_tag == '' || github.event.inputs.force_build == 'true')) }}
    uses: ./.github/workflows/reusable-image-build.yml
    with:
      aws_region: eu-west-1
      service_filter: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.service_filter || '' }}
      image_tag: ${{ format('sha-{0}', github.sha) }}
      push_latest: ${{ github.ref == 'refs/heads/master' }}
    secrets:
      aws_role_arn: ${{ secrets.AWS_IMAGES_ROLE_ARN }}

  deploy:
    needs: build-images
    # Run when build-images succeeded OR was skipped (dispatch with pre-built image_tag)
    if: ${{ !cancelled() && (needs.build-images.result == 'success' || needs.build-images.result == 'skipped') }}
    uses: ./.github/workflows/reusable-ecs-rollout.yml
    with:
      environment: test
      image_tag: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force_build != 'true' && github.event.inputs.image_tag != '' && github.event.inputs.image_tag || needs.build-images.result == 'success' && format('sha-{0}', github.sha) || 'latest' }}
      apply_infra: ${{ github.event_name == 'push' || github.event.inputs.apply_infra == 'true' }}
      service_filter: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.service_filter || '' }}
      aws_region: eu-west-1
    secrets:
      aws_role_arn: ${{ secrets.AWS_TEST_DEPLOY_ROLE_ARN }}
      infra_aws_role_arn: ${{ secrets.AWS_INFRA_ROLE_ARN }}
      tf_backend_bucket: ${{ secrets.TF_BACKEND_BUCKET }}
      tf_backend_dynamodb_table: ${{ secrets.TF_BACKEND_DYNAMODB_TABLE }}
      tf_backend_kms_key_id: ${{ secrets.TF_BACKEND_KMS_KEY_ID }}

  notify-platform:
    needs: deploy
    runs-on: ubuntu-latest
    if: ${{ needs.deploy.result == 'success' }}
    env:
      PLATFORM_REPO_DISPATCH_TOKEN: ${{ secrets.PLATFORM_REPO_DISPATCH_TOKEN }}

    steps:
      - name: Skip platform dispatch when token is not configured
        if: ${{ env.PLATFORM_REPO_DISPATCH_TOKEN == '' }}
        run: echo "::warning title=Platform dispatch skipped::Secret PLATFORM_REPO_DISPATCH_TOKEN is not configured; core deploy completed without triggering raksha-platform."

      - name: Trigger platform deployment dispatch
        if: ${{ env.PLATFORM_REPO_DISPATCH_TOKEN != '' }}
        env:
          GH_TOKEN: ${{ env.PLATFORM_REPO_DISPATCH_TOKEN }}
          TARGET_REPO: raksha-labs/raksha-platform
          CORE_IMAGE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.image_tag || format('sha-{0}', github.sha) }}
          CORE_CONTRACT_VERSION: ${{ needs.deploy.outputs.core_contract_version }}
          TRIGGER_SHA: ${{ github.sha }}
        run: |
          payload=$(printf '{"event_type":"core_release_ready","client_payload":{"environment":"test","core_image_tag":"%s","core_contract_version":"%s","trigger_sha":"%s"}}' "$CORE_IMAGE_TAG" "$CORE_CONTRACT_VERSION" "$TRIGGER_SHA")

          curl -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            https://api.github.com/repos/${TARGET_REPO}/dispatches \
            -d "${payload}"
