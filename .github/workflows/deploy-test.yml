name: Deploy Test Environment

on:
  push:
    branches: [main]
    paths:
      - 'infra/**'
      - 'apps/**'
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'Dockerfile'
      - '.github/workflows/deploy-test.yml'
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to deploy
        required: false
        default: latest
        type: string
      apply_infra:
        description: Apply Terraform before deploy
        required: true
        default: true
        type: boolean
      service_filter:
        description: Comma-separated service names (empty = all)
        required: false
        default: ''
        type: string

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-1
  TERRAFORM_DIR: infra/terraform/environments/test

jobs:
  deploy:
    name: Deploy test
    runs-on: ubuntu-latest
    environment: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TEST_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform init -backend=false

      - name: Terraform apply
        if: github.event_name == 'push' || github.event.inputs.apply_infra == 'true'
        working-directory: ${{ env.TERRAFORM_DIR }}
        env:
          IMAGE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.image_tag || format('sha-{0}', github.sha) }}
        run: |
          terraform apply -auto-approve -var="image_tag=${IMAGE_TAG}"

      - name: Resolve cluster name
        id: cluster
        working-directory: ${{ env.TERRAFORM_DIR }}
        env:
          FALLBACK_CLUSTER: ${{ secrets.TEST_ECS_CLUSTER }}
        run: |
          set -e
          CLUSTER=""
          if terraform output -raw cluster_name >/tmp/cluster_name 2>/tmp/cluster_err; then
            CLUSTER=$(cat /tmp/cluster_name)
          elif [ -n "$FALLBACK_CLUSTER" ]; then
            CLUSTER="$FALLBACK_CLUSTER"
          fi

          if [ -z "$CLUSTER" ]; then
            echo "Unable to determine ECS cluster name"
            cat /tmp/cluster_err || true
            exit 1
          fi

          echo "cluster_name=$CLUSTER" >> "$GITHUB_OUTPUT"

      - name: Force ECS service deployment
        env:
          CLUSTER_NAME: ${{ steps.cluster.outputs.cluster_name }}
          SERVICE_FILTER: ${{ github.event.inputs.service_filter }}
        run: |
          set -euo pipefail

          SERVICES=(
            indexer detector scorer orchestrator finality market-indexer market-detector
          )

          FILTER=",${SERVICE_FILTER},"
          for svc in "${SERVICES[@]}"; do
            if [ -n "${SERVICE_FILTER}" ] && ! echo "$FILTER" | grep -q ",$svc,"; then
              continue
            fi

            echo "Deploying service: $svc"
            aws ecs update-service \
              --cluster "$CLUSTER_NAME" \
              --service "defi-surv-test-${svc}" \
              --force-new-deployment \
              --region "$AWS_REGION"
          done
