name: Deploy Test Environment

on:
  push:
    branches: [main]
    paths:
      - 'infra/**'
      - 'apps/**'
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'Dockerfile'
      - '.github/workflows/deploy-test.yml'
      - '.github/workflows/reusable-ecs-rollout.yml'
      - 'scripts/ci/**'
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to deploy
        required: false
        default: latest
        type: string
      apply_infra:
        description: Apply Terraform before deploy
        required: true
        default: true
        type: boolean
      service_filter:
        description: Comma-separated service names (empty = all)
        required: false
        default: ''
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    uses: ./.github/workflows/reusable-ecs-rollout.yml
    with:
      environment: test
      image_tag: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.image_tag || format('sha-{0}', github.sha) }}
      apply_infra: ${{ github.event_name == 'push' || github.event.inputs.apply_infra == 'true' }}
      service_filter: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.service_filter || '' }}
      aws_region: eu-west-1
    secrets:
      aws_role_arn: ${{ secrets.AWS_TEST_DEPLOY_ROLE_ARN }}
      tf_backend_bucket: ${{ secrets.TF_BACKEND_BUCKET }}
      tf_backend_dynamodb_table: ${{ secrets.TF_BACKEND_DYNAMODB_TABLE }}
      tf_backend_kms_key_id: ${{ secrets.TF_BACKEND_KMS_KEY_ID }}

  notify-platform:
    needs: deploy
    runs-on: ubuntu-latest
    if: ${{ needs.deploy.result == 'success' }}

    steps:
      - name: Ensure dispatch token exists
        run: |
          if [ -z "${{ secrets.PLATFORM_REPO_DISPATCH_TOKEN }}" ]; then
            echo "Missing required secret PLATFORM_REPO_DISPATCH_TOKEN"
            exit 1
          fi

      - name: Trigger platform deployment dispatch
        env:
          GH_TOKEN: ${{ secrets.PLATFORM_REPO_DISPATCH_TOKEN }}
          TARGET_REPO: defi-surv/defi-surv-platform
          CORE_IMAGE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.image_tag || format('sha-{0}', github.sha) }}
          CORE_CONTRACT_VERSION: ${{ needs.deploy.outputs.core_contract_version }}
          TRIGGER_SHA: ${{ github.sha }}
        run: |
          payload=$(printf '{"event_type":"core_release_ready","client_payload":{"environment":"test","core_image_tag":"%s","core_contract_version":"%s","trigger_sha":"%s"}}' "$CORE_IMAGE_TAG" "$CORE_CONTRACT_VERSION" "$TRIGGER_SHA")

          curl -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            https://api.github.com/repos/${TARGET_REPO}/dispatches \
            -d "${payload}"
