name: CI - Core

on:
  pull_request:
    branches: [master, develop]
    paths:
      - 'apps/**'
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'Dockerfile'
      - '.github/workflows/ci.yml'
  push:
    branches: [master, develop]
    paths:
      - 'apps/**'
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'Dockerfile'
      - '.github/workflows/ci.yml'

concurrency:
  group: core-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust-test:
    name: Rust Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: defi_surv_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run Rust tests
        run: cargo test --workspace --all-features
        env:
          DATABASE_URL: postgres://postgres:password@localhost:5432/defi_surv_test
          REDIS_URL: redis://localhost:6379

      - name: Run Clippy
        run: cargo clippy --workspace --all-features -- -D warnings

      - name: Check formatting
        run: cargo fmt --all -- --check

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [test, stage, prod]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Terraform format check
        run: terraform fmt -check -recursive infra/terraform

      - name: Terraform init (no backend)
        working-directory: infra/terraform/environments/${{ matrix.environment }}
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: infra/terraform/environments/${{ matrix.environment }}
        run: terraform validate

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: Run TFLint
        working-directory: infra/terraform/environments/${{ matrix.environment }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tflint --init
          tflint --recursive

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Generate Cargo.lock for audit
        run: cargo generate-lockfile

      - name: Rust security audit
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ignore: RUSTSEC-2025-0009  # ring 0.16 AES panic - blocked by ethers→jsonwebtoken dep chain; tracked for alloy migration

      - name: Install tfsec
        run: |
          curl -sL https://raw.githubusercontent.com/aquasecurity/tfsec/master/scripts/install_linux.sh | bash
          if [ -x ./bin/tfsec ]; then
            sudo install ./bin/tfsec /usr/local/bin/tfsec
          elif [ -x ./tfsec ]; then
            sudo install ./tfsec /usr/local/bin/tfsec
          elif command -v tfsec >/dev/null 2>&1; then
            echo "tfsec already available at $(command -v tfsec)"
          else
            echo "tfsec binary not found after installer run"
            exit 1
          fi
          tfsec --version

      - name: Terraform security scan
        run: tfsec infra/terraform/modules --soft-fail
