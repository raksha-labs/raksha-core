name: Terraform Plan

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'infra/**'
      - '.github/workflows/infra-plan.yml'
  workflow_dispatch:
    inputs:
      target_environment:
        description: Environment to plan
        required: true
        default: test
        type: choice
        options:
          - test
          - stage
          - prod
      image_tag:
        description: Image tag override used for plan
        required: false
        default: latest
        type: string

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  AWS_REGION: eu-west-1

jobs:
  plan:
    name: Plan (${{ matrix.environment }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: [test, stage, prod]

    if: github.event_name != 'workflow_dispatch' || matrix.environment == github.event.inputs.target_environment

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_INFRA_PLAN_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init (no backend)
        working-directory: infra/terraform/environments/${{ matrix.environment }}
        run: terraform init -backend=false

      - name: Terraform plan
        id: plan
        working-directory: infra/terraform/environments/${{ matrix.environment }}
        env:
          IMAGE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.image_tag || format('sha-{0}', github.sha) }}
        run: |
          set -o pipefail
          terraform plan \
            -no-color \
            -lock=false \
            -refresh=true \
            -var="image_tag=${IMAGE_TAG}" \
            -out=tfplan | tee plan.txt

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ matrix.environment }}
          path: infra/terraform/environments/${{ matrix.environment }}/plan.txt

      - name: Add plan summary
        if: always()
        working-directory: infra/terraform/environments/${{ matrix.environment }}
        run: |
          echo "### Terraform plan (${{ matrix.environment }})" >> "$GITHUB_STEP_SUMMARY"
          if [ -f plan.txt ]; then
            tail -n 20 plan.txt >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Plan output not generated." >> "$GITHUB_STEP_SUMMARY"
          fi
