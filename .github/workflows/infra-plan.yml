name: Terraform Plan

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'infra/**'
      - '.github/workflows/infra-plan.yml'
      - '.github/workflows/reusable-terraform-plan.yml'
      - 'scripts/ci/**'
  workflow_dispatch:
    inputs:
      target_environment:
        description: Environment to plan
        required: true
        default: test
        type: choice
        options:
          - test
          - stage
          - prod
      image_tag:
        description: Image tag override used for plan
        required: false
        default: latest
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  plan:
    strategy:
      fail-fast: false
      matrix:
        environment: [test, stage, prod]

    if: github.event_name != 'workflow_dispatch' || matrix.environment == github.event.inputs.target_environment

    uses: ./.github/workflows/reusable-terraform-plan.yml
    with:
      environment: ${{ matrix.environment }}
      image_tag: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.image_tag || format('sha-{0}', github.sha) }}
      aws_region: eu-west-1
    secrets:
      aws_role_arn: ${{ secrets.AWS_INFRA_PLAN_ROLE_ARN }}
      tf_backend_bucket: ${{ secrets.TF_BACKEND_BUCKET }}
      tf_backend_dynamodb_table: ${{ secrets.TF_BACKEND_DYNAMODB_TABLE }}
      tf_backend_kms_key_id: ${{ secrets.TF_BACKEND_KMS_KEY_ID }}
